name: Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "*/53 * * * *"   # 🕕 每小时运行一次

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Gaming4Free-Auto-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 设置 WARP 出口
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Install System Dependencies
        run: |
          sudo apt-get update -q
          # 补充字体库防止网页或截图出现方块乱码，同时保留音频环境
          sudo apt-get install -y google-chrome-stable xvfb ffmpeg fonts-wqy-zenhei fonts-noto-cjk \
            pulseaudio alsa-utils
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          # 移除 DrissionPage，引入 seleniumbase
          pip install seleniumbase requests pydub SpeechRecognition

      - name: Run script
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p scripts/screenshots
          # 使用原生 xvfb-run 启动，更稳定
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python -u scripts/renew.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/*.png
          if-no-files-found: warn
          retention-days: 1

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0 
          keep_minimum_runs: 2
